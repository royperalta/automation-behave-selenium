name: 🌐 E2E Tests — Behave + Selenium

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags (smoke / regression / e2e / Caso_1)'
        required: false
        default: 'smoke'
      browser:
        description: 'Navegador'
        required: false
        default: 'chrome'
        type: choice
        options: [chrome, firefox]

env:
  PYTHON_VERSION: '3.11'

jobs:

  smoke-tests:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      # En GitHub Actions, Chrome ya viene instalado en ubuntu-latest.
      # webdriver-manager descarga el ChromeDriver compatible automáticamente.
      - name: 🌐 Verificar Chrome instalado
        run: google-chrome --version

      - name: 💨 Ejecutar Smoke Tests
        run: |
          mkdir -p reports screenshots
          behave --tags=smoke \
                 --format=pretty \
                 --format=json \
                 --outfile=reports/smoke-results.json \
                 -D headless=true \
                 -D browser=${{ github.event.inputs.browser || 'chrome' }} \
                 -D screenshot_on_fail=true

      - name: 📊 Publicar artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: |
            reports/smoke-results.json
            screenshots/
          retention-days: 7


  regression-tests:
    name: 🔁 Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔁 Ejecutar Regression Tests
        run: |
          mkdir -p reports screenshots
          behave --tags=regression \
                 --format=pretty \
                 --format=json \
                 --outfile=reports/regression-results.json \
                 -D headless=true \
                 -D browser=${{ github.event.inputs.browser || 'chrome' }} \
                 -D screenshot_on_fail=true

      - name: 📊 Publicar artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: |
            reports/regression-results.json
            screenshots/
          retention-days: 14


  full-e2e:
    name: 🚀 Full E2E Suite
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🚀 Suite completa
        run: |
          TAGS="${{ github.event.inputs.tags || 'smoke or regression' }}"
          behave --tags="$TAGS" \
                 --format=pretty \
                 --format=json \
                 --outfile=reports/full-results.json \
                 -D headless=true \
                 -D browser=${{ github.event.inputs.browser || 'chrome' }} \
                 -D screenshot_on_fail=true

      - name: 📊 Publicar reporte completo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-e2e-report
          path: |
            reports/
            screenshots/
          retention-days: 30

      - name: 📝 Resumen GitHub Actions
        if: always()
        run: |
          echo "## 🌐 E2E Tests — SauceDemo (Selenium)" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Browser | ${{ github.event.inputs.browser || 'chrome' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Tags | \`${{ github.event.inputs.tags || 'smoke or regression' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 App | https://www.saucedemo.com |" >> $GITHUB_STEP_SUMMARY
